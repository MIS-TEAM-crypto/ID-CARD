<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hemraj Industries</title>
<style>
  body { background: #111; color: #ddd; font-family: sans-serif; display: flex;
         align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { text-align: center; padding: 30px; }
  .logo { width: 54px; height: 54px; background: #c0182a; border-radius: 12px;
          display: flex; align-items: center; justify-content: center;
          font-size: 1.8rem; font-weight: 700; color: #fff; margin: 0 auto 16px; }
  h2 { color: #e8c06a; font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
  p  { color: #444; font-size: .8rem; }
  .spin { width: 32px; height: 32px; border: 3px solid #222; border-top: 3px solid #c0182a;
          border-radius: 50%; animation: s .7s linear infinite; margin: 18px auto 0; }
  @keyframes s { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="box">
  <div class="logo">H</div>
  <h2>Hemraj Industries</h2>
  <p>Loading employee information…</p>
  <div class="spin"></div>
</div>
<script>
// Read the code from URL and redirect to Apps Script viewer
var params  = new URLSearchParams(window.location.search);
var mode    = params.get('mode') || 'view';
var code    = params.get('code') || '';
var GS_URL  = 'https://script.google.com/macros/s/AKfycbw1FygtE1P_1tqj_kFobxgjpigxYFwYwZ9rtmx628mUuEfoYZk_ssblltd0EbnOUCLjNg/exec';

if (mode === 'view' && code) {
  // Redirect to Apps Script which serves the full viewer page
  window.location.replace(GS_URL + '?mode=view&code=' + encodeURIComponent(code));
} else if (mode === 'complaint') {
  // Pass through all params
  window.location.replace(GS_URL + '?' + params.toString());
} else {
  // No params — show generator page (load same page as app)
  document.querySelector('p').textContent = 'Welcome to Hemraj Industries ID System.';
  document.querySelector('.spin').style.display = 'none';
}
</script>
</body>
</html>
